<body>

    <header class="encabezado">

        <nav class="menu-principal">

        <div class="logo">

        <nav class="menu-iconos">

        <section class="titulo-catalogo">
            <h1>Catálogo de Perfumes</h1>

        <section class="contenedor-catalogo">

            <aside class="filtros">

                <h2>Filtros</h2>

                <label for="marca">Marca</label>

                <select id="marca">
                    <option value="">Todas</option>
                    <option value="Versace">Versace</option>
                    <option value="Afnan">Afnan</option>
                    <option value="Paco Rabanne">Paco Rabanne</option>
                    <option value="Carolina Herrera">Carolina Herrera</option>
                </select>

                <label for="precio">
                    Precio máximo
                </label>

                <input type="range"
                       id="precio"
                       min="0"
                       max="5000"
                       value="5000">

                <p id="valorPrecio">
                    $5000
                </p>

                <button id="btnFiltrar">
                    Filtrar
                </button>

            </aside>

            <section id="contenedorPerfumes" class="productos">
