<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta</title>

    <link rel="stylesheet" href="css/estiloPaginas.css">
    <link rel="stylesheet" href="css/crearCuenta.css">
</head>

<body>

    <header class="encabezado">

        <nav class="menu-principal">

            <ul>
                <li><a href="catalogo.html">Fragancias</a></li>
            </ul>
        </nav>

        <div class="logo">
            <a href="principal.html">
                <img src="img/logotransparente.png" alt="Logo">
            </a>
        </div>

        <nav class="menu-iconos">
            <ul>
                <li><a href="login.html"><img src="img/user.png" alt="Usuario"></a></li>
                <li><a href="perfumesFavoritos.html"><img src="img/favorito.png" alt="Favoritos"></a></li>
                <li><a href="catalogo.html"><img src="img/lupa.png" alt="Buscar"></a></li>
                <li><a href="detallesCompra.html"><img src="img/carrito.png" alt="Carrito"></a></li>
            </ul>
        </nav>

    </header>

    <main>

        <section class="titulo-cuenta">
            <h1>Crear Cuenta</h1>
        </section>

        <section class="contenedor-cuenta">

            <h2>Registro de usuario</h2>

            <form id="formCrearCuenta">

                <label for="nombre">
                    Nombre completo *
                </label>
                <input type="text" id="nombre">

                <label for="correo">
                    Correo electrónico *
                </label>
                <input type="email" id="correo">

                <label for="telefono">
                    Teléfono *
                </label>
                <input type="tel" id="telefono">

                <label for="password">
                    Contraseña *
                </label>
                <input type="password" id="password">

                <label for="confirmarPassword">
                    Confirmar contraseña *
                </label>
                <input type="password" id="confirmarPassword">

                

                

                <button type="submit">
                    Crear cuenta
                </button>

            </form>

            <p>
                ¿Ya tienes cuenta?
                <a href="login.html">Inicia sesión aquí</a>
            </p>

        </section>

    </main>

    <footer>
        <p>Proyecto escolar de Fundamentos de Tecnologías Web.</p>
    </footer>

    <script src="javaScript/crearCuenta.js"></script>

</body>

</html>
